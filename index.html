<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝐀𝐑𝐀𝐁 𝐕𝐀𝐋𝐀</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --main:#ff3c00;
    --glow:#ff7a00;
}
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#0a0000;
    color:#fff;
}

/* 🔥 العنوان */
.animated-title{
    font-weight:900;
    font-size:26px;
    background: linear-gradient(90deg, #ff3c00, #ff7a00, #ff3c00);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: gradientMove 3s linear infinite, scaleText 2s infinite;
}
@keyframes gradientMove{100%{background-position:200%;}}
@keyframes scaleText{50%{transform:scale(1.1);}}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    background:#120000;
}
nav button{
    position:relative;
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
    overflow:hidden;
    padding:10px 15px;
}
nav button::before{
    content:"";
    position:absolute;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, var(--glow), transparent);
    transition:.5s;
}
nav button:hover::before{left:100%;}
nav button:hover{
    transform:scale(1.1);
    color:var(--main);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}
.logo-name{
    display:flex;
    gap:10px;
    align-items:center;
}
.logo-name img{
    width:50px;
    border-radius:10px;
}

/* DISCORD */
.discord{
    background:#5865F2;
    padding:10px 20px;
    border-radius:25px;
    text-decoration:none;
    color:#fff;
    transition:.3s;
}
.discord:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #5865F2;
}

/* اللوجو */
.center-logo{
    display:flex;
    justify-content:center;
    margin:40px 0;
    position:relative;
}
.center-logo img{
    width:180px;
    animation:float 3s infinite;
}
.center-logo::before{
    content:"";
    position:absolute;
    width:230px;
    height:230px;
    border-radius:50%;
    background:radial-gradient(circle,var(--main),transparent);
    animation:pulse 2s infinite;
    z-index:-1;
}
@keyframes float{50%{transform:translateY(-10px);}}
@keyframes pulse{50%{transform:scale(1.2);opacity:.5;}}

/* SECTIONS */
section{display:none;width:90%;margin:auto;}
section.active{display:block}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card,.product{
    background:#120000;
    padding:20px;
    border-radius:15px;
    text-align:center;
    border:1px solid var(--main);
    transition:.3s;
}
.card:hover,.product:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 0 20px var(--glow);
}

button{
    width:100%;
    padding:10px;
    background:var(--main);
    border:none;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    box-shadow:0 0 15px var(--glow);
}
button:active{transform:scale(0.9);}

/* CART */
.cart-item{
    display:flex;
    justify-content:space-between;
    background:#120000;
    padding:15px;
    margin-bottom:10px;
    transition:.4s;
}
.cart-item.remove{
    transform:translateX(120%);
    opacity:0;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
}
.popup-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:350px;
}
input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#000;
    border:1px solid var(--main);
    color:#fff;
}

/* BACK */
.back-btn{
    background:#222;
    border:1px solid var(--main);
}
.back-btn:hover{
    background:var(--main);
    transform:translateX(-5px);
}

/* CHECKOUT */
.checkout-animate{
    animation:pop .4s;
}
@keyframes pop{
    50%{transform:scale(1.2);}
}
</style>
</head>

<body>

<header>
<div class="logo-name">
<img src="logo.png">
<h2 class="animated-title">𝐀𝐑𝐀𝐁 𝐕𝐀𝐋𝐀</h2>
</div>

<a class="discord" href="https://discord.gg/Y9bB38xHTC" target="_blank">
دخول الديسكورد
</a>
</header>

<div class="center-logo">
<img src="logo.gif">
</div>

<nav>
<button onclick="showSection('apply')">التقديمات</button>
<button onclick="showSection('shop')">المتجر</button>
<button onclick="showSection('cart')">السلة</button>
</nav>

<!-- التقديم -->
<section id="apply" class="active">
<h2>التقديمات</h2>
<div class="grid">
<div class="card" onclick="openForm('امن وطني')">امن وطني</div>
<div class="card" onclick="openForm('وزارة الداخليه')">وزارة الداخليه</div>
<div class="card" onclick="openForm('جيش الاحتلال')">جيش الاحتلال</div>
<div class="card" onclick="openForm('مجلس وزراء')">مجلس وزراء</div>
<div class="card" onclick="openForm('كتيبة جنين')">كتيبة جنين</div>
<div class="card" onclick="openForm('كتيبة الرد السريع')">كتيبة الرد السريع</div>
<div class="card" onclick="openForm('عصابات')">عصابات</div>
<div class="card" onclick="openForm('القوات المسلحه')">القوات المسلحه</div>
</div>
</section>

<!-- فورم -->
<div class="popup" id="popup">
<div class="popup-content">
<h3 id="title"></h3>
<input id="name" placeholder="اسمك">
<input id="discordId" placeholder="Discord ID">
<textarea id="exp" placeholder="خبرتك"></textarea>
<button onclick="send()">إرسال</button>
</div>
</div>

<!-- المتجر -->
<section id="shop">
<h2>المتجر</h2>
<div class="grid" id="productsContainer"></div>
</section>

<!-- السلة -->
<section id="cart">
<h2>السلة</h2>
<div id="cartContainer"></div>
<p id="totalPrice">الإجمالي: 0 جنية</p>
<button onclick="checkout(event)">الدفع</button>
</section>

<!-- الدفع -->
<div class="popup" id="checkoutPopup">
<div class="popup-content">
<h3>تفاصيل الدفع</h3>
<input id="customerName" placeholder="اسم العميل">
<input id="customerDiscord" placeholder="يوزر الديسكورد">
<textarea id="customerDetails" placeholder="تفاصيل إضافية"></textarea>
<div id="checkoutProducts"></div>
<button onclick="sendOrder()">إرسال الطلب</button>
<button class="back-btn" onclick="closeCheckout()">⬅ الرجوع إلى الموقع</button>
</div>
</div>

<script>
// التنقل
function showSection(id){
    document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// الفورم
function openForm(name){
    document.getElementById("popup").style.display="flex";
    document.getElementById("title").innerText="تقديم لـ "+name;
}
function send(){
    alert("تم إرسال التقديم 🔥");
    document.getElementById("popup").style.display="none";
}

// المنتجات
const products = [
{ name:"راعى برونزى 🥉", price:30, image:"images/bronze.png", description:"براونزي مميز", rating:"⭐⭐⭐" },
{ name:"راعى فضى 🥈", price:40, image:"images/silver.png", description:"فضى ممتاز", rating:"⭐⭐⭐⭐" },
{ name:"راعى الماس 💎", price:55, image:"images/diamond.png", description:"عضوية الماس", rating:"⭐⭐⭐⭐⭐" },
{ name:"راعى بريميوم 🔥", price:70, image:"images/premium.png", description:"برايم مميز", rating:"⭐⭐⭐⭐⭐" },
{ name:"راعى بريميوم بلس ✨", price:90, image:"images/premiumplus.png", description:"أفضل عضوية", rating:"⭐⭐⭐⭐⭐" },
{ name:"سياره مميزه 🚗", price:80, image:"images/car.png", description:"سيارة مميزة", rating:"⭐⭐⭐⭐" },
{ name:"أي دى مميز 🔑", price:150, image:"images/vipid.png", description:"VIP مميز", rating:"⭐⭐⭐⭐⭐" }
];

const container = document.getElementById('productsContainer');
products.forEach(product=>{
    container.innerHTML+=`
    <div class="product">
    <img src="${product.image}" style="width:100%;border-radius:10px;">
    <h3>${product.name}</h3>
    <p>${product.description}</p>
    <span>${product.price} جنية</span>
    <p>${product.rating}</p>
    <button onclick="addToCart('${product.name}',${product.price})">أضف إلى السلة</button>
    </div>`;
});

// السلة
let cart = [];
const cartContainer = document.getElementById('cartContainer');

function renderCart(){
    cartContainer.innerHTML="";
    let total=0;
    cart.forEach((item,index)=>{
        total+=item.price;
        cartContainer.innerHTML+=`
        <div class="cart-item">
        <span>${item.name} - ${item.price} جنية</span>
        <button onclick="removeItem(${index})">حذف</button>
        </div>`;
    });
    document.getElementById("totalPrice").innerText="الإجمالي: "+total+" جنية";
}

function addToCart(name,price){
    cart.push({name,price});
    renderCart();
}

function removeItem(index){
    const items=document.querySelectorAll('.cart-item');
    items[index].classList.add('remove');

    setTimeout(()=>{
        cart.splice(index,1);
        renderCart();
    },400);
}

// الدفع
function checkout(e){
    e.target.classList.add("checkout-animate");
    setTimeout(()=>e.target.classList.remove("checkout-animate"),400);

    if(cart.length==0){alert("السلة فارغة");return;}

    const div=document.getElementById("checkoutProducts");
    div.innerHTML="";
    cart.forEach(i=>{
        div.innerHTML+=`<p>${i.name} - ${i.price}</p>`;
    });

    document.getElementById("checkoutPopup").style.display="flex";
}

function closeCheckout(){
    document.getElementById("checkoutPopup").style.display="none";
}

function sendOrder(){
    alert("تم الطلب 🔥");
    cart=[];
    renderCart();
    closeCheckout();
}
</script>

</body>
</html>
